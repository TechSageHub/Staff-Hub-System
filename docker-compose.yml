services:
  web:
    build:
      context: .
      dockerfile: Presentation/Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${DB_NAME:-EmployeeDbReloaded};User Id=sa;Password=${SA_PASSWORD:-Your_password123};TrustServerCertificate=True;Encrypt=False;"
      CloudinarySettings__CloudName: "${CLOUDINARY_CLOUD_NAME:-}"
      CloudinarySettings__ApiKey: "${CLOUDINARY_API_KEY:-}"
      CloudinarySettings__ApiSecret: "${CLOUDINARY_API_SECRET:-}"
      MailSettings__FromEmail: "${MAIL_FROM_EMAIL:-}"
      MailSettings__Password: "${MAIL_PASSWORD:-}"
      MailSettings__SmtpHost: "${MAIL_SMTP_HOST:-smtp.gmail.com}"
      MailSettings__SmtpPort: "${MAIL_SMTP_PORT:-587}"
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD:-Your_password123}"
      MSSQL_PID: "${MSSQL_PID:-Developer}"
    ports:
      - "${SQL_PORT:-1433}:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
